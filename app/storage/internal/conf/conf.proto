syntax = "proto3";
package kratos.api;

option go_package = "shared-device-saas/app/storage/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message JWT {
    string access_secret = 1;
    string refresh_secret = 2;
    google.protobuf.Duration access_expiry = 3;
    google.protobuf.Duration refresh_expiry = 4;
  }
  Database database = 1;
  Redis redis = 2;
  JWT jwt = 3;
}
