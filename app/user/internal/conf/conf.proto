syntax = "proto3";
package kratos.api;

option go_package = "shared-device-saas/app/user/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  JWT jwt = 3;
  Storage storage = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string addr = 1;           // Redis 地址 (host:port)
    string password = 2;       // Redis 密码
    int32 db = 3;              // Redis 数据库编号
    google.protobuf.Duration read_timeout = 4;
    google.protobuf.Duration write_timeout = 5;
  }
  message MongoDB {
    string uri = 1;        // MongoDB 连接 URI
    string database = 2;   // 数据库名
    string collection = 3; // 集合名
  }
  message JWT {
    string access_secret = 1;    // Access Token 密钥
    string refresh_secret = 2;   // Refresh Token 密钥
    google.protobuf.Duration access_expiry = 3;  // Access Token 有效期
    google.protobuf.Duration refresh_expiry = 4; // Refresh Token 有效期
  }
  message SMS {
    string api_url = 1;      // 短信 API 地址
    string account = 2;      // APIID
    string password = 3;     // APIKEY
    string template_id = 4;  // 短信模板ID
  }
  message Mongo {
    string uri = 1;
    string database = 2;
    string username = 3;
    string password = 4;
    string auth_source = 5;
    int32 max_pool_size = 6;
    int32 min_pool_size = 7;
    google.protobuf.Duration connect_timeout = 8;
  }
  Database database = 1;
