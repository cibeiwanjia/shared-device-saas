%% 服务端超级用户（client_id 以 "device-service-" 开头）允许所有操作
{allow, {clientid, "device-service-"}, all, ["#"]}.

%% 设备只能发布到自己的 status/heartbeat/event topic
{allow, all, publish, ["${tenant_id}/device/+/${device_id}/status", "${tenant_id}/device/+/${device_id}/heartbeat", "${tenant_id}/device/+/${device_id}/event"]}.

%% 设备只能订阅自己的 command/response topic
{allow, all, subscribe, ["${tenant_id}/device/+/${device_id}/command", "${tenant_id}/device/+/${device_id}/response"]}.

%% 拒绝其他所有操作
{deny, all}.
